[workspace]
members = ["crates/*"]
default-members = ["crates/glorp-cli"]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
clap = { features = ["derive"] }
cosmic-text = true
iced = { default-features = false, features = ["advanced", "canvas", "lazy", "wgpu", "tokio", "crisp", "hinting", "web-colors", "linux-theme-detection", "x11", "wayland"] }
iced_runtime = true
nu-plugin = true
nu-plugin-test-support = true
nu-protocol = true
pollster = true
serde = { features = ["derive"] }
serde_json = true
thiserror = true
tracing = true
tracing-subscriber = { features = ["env-filter"] }

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

# Enable more optimization in the release profile at the cost of compile time.
[profile.release]
codegen-units = 1
lto = "thin"

[profile.wasm-release]
inherits = "release"
opt-level = "s"
strip = "debuginfo"
